<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Afacad Flux',sans-serif;background:#fff;color:#111;min-height:100vh;-webkit-tap-highlight-color:transparent}
input,button,textarea{font-family:inherit;font-size:15px;outline:none}
input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111}
input:focus{border-color:#999}
button{cursor:pointer;border-radius:8px;border:1px solid #ddd;background:#fff;color:#111;padding:9px 18px;transition:background 0.15s}
button:hover{background:#f5f5f5}
button:active{transform:scale(0.97)}
button:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.page{max-width:460px;margin:0 auto;padding:3rem 1.5rem 2rem}
.page-wide{max-width:740px;margin:0 auto;padding:2rem 1.5rem}
.brand{font-size:11px;letter-spacing:.1em;color:#bbb;text-transform:uppercase;margin-bottom:8px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:8px}
.error{font-size:13px;color:#dc2626;margin-top:6px}
.muted{color:#aaa;font-size:13px}
.btn-primary{background:#111;color:#fff;border-color:#111;width:100%;padding:11px;font-size:15px}
.btn-primary:hover{background:#333}
.btn-outline{background:#fff;border:1px solid #ddd}
.empty{color:#aaa;font-size:14px;text-align:center;padding:3rem 0}
.grid-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-top:16px}
.drop-zone{border:1.5px dashed #ccc;border-radius:8px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:12px}
.drop-zone.over{border-color:#888;background:#fafafa}
.progress-bar{height:4px;background:#f0f0f0;border-radius:4px;margin-top:8px}
.progress-fill{height:100%;background:#111;border-radius:4px;transition:width 0.3s}
.swipe-page{max-width:440px;margin:0 auto;padding:2rem 1.5rem;touch-action:none}
.card-stack{position:relative;height:74vw;max-height:520px;min-height:340px;margin-bottom:1.5rem;touch-action:none;user-select:none}
.swipe-card{position:absolute;inset:0;border-radius:12px;overflow:hidden;border:1px solid #e5e5e5;background:#f5f5f5;will-change:transform}
.swipe-card img{width:100%;height:100%;object-fit:contain;pointer-events:none;-webkit-user-drag:none;background:#f5f5f5}
.swipe-label{position:absolute;bottom:0;left:0;right:0;padding:2rem 1rem 1rem;background:linear-gradient(transparent,rgba(0,0,0,.55))}
.swipe-label p{color:#fff;font-size:14px;font-weight:500}
.badge-vote{position:absolute;top:16px;padding:5px 14px;color:#fff;border-radius:8px;font-size:14px;font-weight:500;pointer-events:none;transition:opacity 0.05s}
.badge-like{left:16px;background:#22c55e}
.badge-nope{right:16px;background:#ef4444}
.swipe-actions{display:flex;gap:14px;justify-content:center;align-items:center}
.btn-circle{border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:2rem;cursor:zoom-out}
.modal-inner{position:relative;max-width:820px;width:100%}
.modal-inner img{width:100%;max-height:80vh;object-fit:contain;border-radius:8px;display:block}
.modal-close{position:absolute;top:-16px;right:-16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.session-row{border:1px solid #e5e5e5;border-radius:8px;padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.session-row:hover{background:#fafafa}
.flex-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.badge{display:inline-block;padding:3px 10px;border-radius:8px;background:#f0f0f0;font-size:13px}
label{font-size:13px;color:#666;display:block;margin-bottom:6px}
@media(max-width:480px){.page,.swipe-page{padding:1.5rem 1rem}.page-wide{padding:1.5rem 1rem}.grid-images{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}

<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback}=React;

const SUPABASE_URL="https://sxvqmhetammwyrdjyseq.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4dnFtaGV0YW1td3lyZGp5c2VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDU1NTMsImV4cCI6MjA5MTY4MTU1M30.1GXKNEi9OJLLYeKwFXyMZRtKeG0Q6b0nWqsgZjqSGwY";
const BUCKET="inspiration";
const DASH_PASS="magik2024";
const SWIPE_THRESHOLD=80;

const apiFetch=(path,opts={})=>fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opts,headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":opts.prefer||"",...(opts.headers||{})}});

const db={
  getImages:async()=>{const r=await apiFetch("images?order=added_at.asc");return r.ok?r.json():[]},
  addImage:async(img)=>apiFetch("images",{method:"POST",body:JSON.stringify(img),prefer:"return=minimal"}),
  removeImage:async(id)=>apiFetch(`images?id=eq.${id}`,{method:"DELETE"}),
  getSessions:async()=>{const r=await apiFetch("sessions?order=started_at.asc");return r.ok?r.json():[]},
  upsertSession:async(s)=>apiFetch("sessions",{method:"POST",body:JSON.stringify(s),prefer:"resolution=merge-duplicates,return=minimal"}),
  uploadImage:async(blob,id)=>{
    const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${id}.jpg`,{method:"POST",headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"image/jpeg","x-upsert":"true"},body:blob});
    if(!r.ok)throw new Error(`Storage ${r.status}: ${await r.text()}`);
    return`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${id}.jpg`;
  }
};

function compressToBlob(file,maxW=1200,quality=0.82){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=()=>rej(new Error("Read failed"));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>rej(new Error("Decode failed"));
      img.onload=()=>{
        const scale=Math.min(1,maxW/img.width);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(b=>b?res(b):rej(new Error("Blob failed")),"image/jpeg",quality);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Swipe Card ──────────────────────────────────────────────────────────────
function SwipeCard({img,onSwipe,isTop,stackIndex}){
  const cardRef=useRef(null);
  const drag=useRef({active:false,startX:0,currentX:0});
  const rafRef=useRef(null);

  const applyTransform=(dx,animate=false)=>{
    const el=cardRef.current;if(!el)return;
    const rot=dx/18;
    el.style.transition=animate?"transform 0.32s cubic-bezier(0.4,0,0.2,1),opacity 0.32s":"none";
    el.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
    el.style.opacity=animate&&Math.abs(dx)>10?"0":"1";
    const likeEl=el.querySelector(".badge-like");
    const nopeEl=el.querySelector(".badge-nope");
    if(likeEl)likeEl.style.opacity=Math.min(1,Math.max(0,dx/80));
    if(nopeEl)nopeEl.style.opacity=Math.min(1,Math.max(0,-dx/80));
  };

  const onStart=useCallback(clientX=>{
    drag.current={active:true,startX:clientX,currentX:clientX};
  },[]);

  const onMove=useCallback(clientX=>{
    if(!drag.current.active)return;
    drag.current.currentX=clientX;
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(()=>applyTransform(clientX-drag.current.startX));
  },[]);

  const onEnd=useCallback(()=>{
    if(!drag.current.active)return;
    drag.current.active=false;
    const dx=drag.current.currentX-drag.current.startX;
    if(dx>SWIPE_THRESHOLD){applyTransform(700,true);setTimeout(()=>onSwipe("like"),300);}
    else if(dx<-SWIPE_THRESHOLD){applyTransform(-700,true);setTimeout(()=>onSwipe("dislike"),300);}
    else{
      const el=cardRef.current;if(el){el.style.transition="transform 0.3s";el.style.transform="translateX(0) rotate(0deg)";}
      const likeEl=el?.querySelector(".badge-like");const nopeEl=el?.querySelector(".badge-nope");
      if(likeEl)likeEl.style.opacity=0;if(nopeEl)nopeEl.style.opacity=0;
    }
  },[onSwipe]);

  useEffect(()=>{
    if(!isTop)return;
    const onMM=e=>onMove(e.clientX);
    const onTM=e=>onMove(e.touches[0].clientX);
    const onMU=()=>onEnd();
    const onTU=()=>onEnd();
    window.addEventListener("mousemove",onMM);
    window.addEventListener("touchmove",onTM,{passive:true});
    window.addEventListener("mouseup",onMU);
    window.addEventListener("touchend",onTU);
    return()=>{
      window.removeEventListener("mousemove",onMM);
      window.removeEventListener("touchmove",onTM);
      window.removeEventListener("mouseup",onMU);
      window.removeEventListener("touchend",onTU);
    };
  },[isTop,onMove,onEnd]);

  const scale=isTop?1:0.94+stackIndex*0.03;
  const ty=isTop?0:(1-stackIndex)*12;

  return React.createElement("div",{
    ref:cardRef,
    className:"swipe-card",
    style:{zIndex:isTop?10:stackIndex,transform:`scale(${scale}) translateY(${ty}px)`,transition:isTop?"none":"transform 0.2s",cursor:isTop?"grab":"default"},
    onMouseDown:isTop?e=>onStart(e.clientX):null,
    onTouchStart:isTop?e=>{e.preventDefault();onStart(e.touches[0].clientX);}:null
  },
    React.createElement("img",{src:img.url,alt:img.label||"",draggable:false}),
    img.label&&React.createElement("div",{className:"swipe-label"},React.createElement("p",null,img.label)),
    isTop&&React.createElement("div",{className:"badge-vote badge-like",style:{opacity:0}},"LIKE"),
    isTop&&React.createElement("div",{className:"badge-vote badge-nope",style:{opacity:0}},"NOPE")
  );
}

// ── Swipe View ───────────────────────────────────────────────────────────────
function SwipeView({images,session,onVote,onSuperLike,onDone}){
  const pending=images.filter(img=>!(img.id in(session.votes||{})));
  if(pending.length===0)return React.createElement(DoneView,{session,onBack:onDone});

  const handleSwipe=dir=>onVote(pending[0].id,dir);

  return React.createElement("div",{className:"swipe-page"},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}},
      React.createElement("p",{className:"muted"},`Hi, ${session.name.split(" ")[0]}`),
      React.createElement("span",{className:"badge"},`${pending.length} left`)
    ),
    React.createElement("div",{className:"card-stack"},
      [...pending].slice(0,3).reverse().map((img,i)=>{
        const fromEnd=Math.min(pending.length,3)-1-i;
        return React.createElement(SwipeCard,{key:img.id,img,isTop:fromEnd===0,stackIndex:i,onSwipe:handleSwipe});
      })
    ),
    React.createElement("div",{className:"swipe-actions"},
      React.createElement("button",{className:"btn-circle btn-outline",style:{width:54,height:54,fontSize:18},onClick:()=>handleSwipe("dislike")},"✕"),
      React.createElement("button",{className:"btn-circle btn-outline",style:{width:62,height:62,fontSize:22,borderColor:session.super_like_used?"#ddd":"#f59e0b",color:session.super_like_used?"#ccc":"#f59e0b",opacity:session.super_like_used?0.3:1},disabled:session.super_like_used,onClick:()=>onSuperLike(pending[0].id)},"★"),
      React.createElement("button",{className:"btn-circle btn-outline",style:{width:54,height:54,fontSize:18,borderColor:"#22c55e",color:"#22c55e"},onClick:()=>handleSwipe("like")},"♥")
    ),
    session.super_like_used&&React.createElement("p",{style:{textAlign:"center",fontSize:12,color:"#aaa",marginTop:10}},"Super like used")
  );
}

// ── Done View ────────────────────────────────────────────────────────────────
function DoneView({session,onBack}){
  return React.createElement("div",{className:"page",style:{textAlign:"center",paddingTop:"4rem"}},
    React.createElement("div",{style:{fontSize:36,marginBottom:16}},"✓"),
    React.createElement("h2",{style:{fontWeight:500,fontSize:22,marginBottom:8}},`All done, ${session.name.split(" ")[0]}!`),
    React.createElement("p",{style:{color:"#888",fontSize:15,lineHeight:1.6,marginBottom:"2rem"}},"Your preferences have been saved. We'll use these to guide the creative direction."),
    React.createElement("button",{className:"btn-outline",onClick:onBack},"Back to home")
  );
}

// ── Home View ────────────────────────────────────────────────────────────────
function HomeView({onStart,onDashboard}){
  const [name,setName]=useState("");

// ── Dashlock View ────────────────────────────────────────────────────────────
function DashlockView({onUnlock,onBack}){

// ── Dashboard View ───────────────────────────────────────────────────────────
function DashboardView({images,sessions,onBack,onReload}){
  const [uploading,setUploading]=useState(false);
  const [uploadError,setUploadError]=useState("");
  const [dragOver,setDragOver]=useState(false);
  const [label,setLabel]=useState("");
  const [downloading,setDownloading]=useState(false);
  const [preview,setPreview]=useState(null);
  const [selectedClient,setSelectedClient]=useState(null);
  const [tab,setTab]=useState("images");
  const fileRef=useRef(null);

  const processFiles=async files=>{
    setUploadError("");setUploading(true);
    const arr=Array.from(files).filter(f=>f.type.startsWith("image/"));
    if(!arr.length){setUploadError("No valid image files.");setUploading(false);return;}
    for(const file of arr){
      try{
        const blob=await compressToBlob(file);
        const id=Date.now().toString()+Math.floor(Math.random()*10000);
        const url=await db.uploadImage(blob,id);
        await db.addImage({id,url,label:label.trim()||file.name.replace(/\.[^.]+$/,""),added_at:Date.now()});
        setLabel("");
      }catch(e){setUploadError(`Error: ${e.message}`);}
    }
    setUploading(false);onReload();
  };

  const removeImage=async id=>{await db.removeImage(id);onReload();};

  const downloadAll=async()=>{
    if(!images.length||!window.JSZip)return;
    setDownloading(true);
    try{
      const zip=new JSZip();
      await Promise.all(images.map(async(img,i)=>{const r=await fetch(img.url);const b=await r.blob();zip.file(`${String(i+1).padStart(2,"0")}_${(img.label||"image").replace(/[^a-zA-Z0-9._-]/g,"_")}.jpg`,b);}));
      const blob=await zip.generateAsync({type:"blob"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="datassist-inspiration.zip";
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
    }catch(e){console.error(e);}
    setDownloading(false);
  };

  const getStats=id=>({
    likes:sessions.filter(s=>s.votes?.[id]==="like").length,
    dislikes:sessions.filter(s=>s.votes?.[id]==="dislike").length,
    superlikes:sessions.filter(s=>s.votes?.[id]==="superlike").length,
  });

  return React.createElement("div",{className:"page-wide"},
    preview&&React.createElement("div",{className:"modal-overlay",onClick:()=>setPreview(null)},
      React.createElement("div",{className:"modal-inner",onClick:e=>e.stopPropagation()},
        React.createElement("img",{src:preview.url,alt:preview.label||""}),
        preview.label&&React.createElement("p",{style:{color:"#fff",textAlign:"center",marginTop:12,fontSize:15,fontWeight:500}},preview.label),
        React.createElement("button",{className:"modal-close",onClick:()=>setPreview(null)},"✕")
      )
    ),
    React.createElement("div",{className:"flex-between"},
      React.createElement("div",null,React.createElement("p",{className:"brand"},"Datassist"),React.createElement("h1",{style:{fontSize:22,fontWeight:500}},"Dashboard")),
      React.createElement("button",{className:"btn-outline",style:{fontSize:13},onClick:onBack},"← Client view")
    ),
    React.createElement("div",{style:{display:"flex",gap:4,borderBottom:"1px solid #e5e5e5",marginBottom:"1.5rem"}},
      ["images","results"].map(t=>React.createElement("button",{key:t,onClick:()=>setTab(t),style:{background:"none",border:"none",borderBottom:tab===t?"2px solid #111":"2px solid transparent",borderRadius:0,padding:"8px 16px",fontSize:14,color:tab===t?"#111":"#aaa",fontWeight:tab===t?500:400,marginBottom:-1,cursor:"pointer"}},t==="images"?`Images (${images.length})`:`Results (${sessions.length})`))
    ),
    tab==="images"&&React.createElement("div",null,
      React.createElement("div",{className:"card",style:{marginBottom:"1.5rem"}},
        React.createElement("div",{style:{padding:"14px 16px 10px",fontSize:15,fontWeight:500,borderBottom:"1px solid #f0f0f0"}},"Upload images"),
        React.createElement("div",{style:{padding:"14px 16px"}},
          React.createElement("div",{className:`drop-zone${dragOver?" over":""}`,onClick:()=>fileRef.current?.click(),onDragOver:e=>{e.preventDefault();setDragOver(true);},onDragLeave:()=>setDragOver(false),onDrop:e=>{e.preventDefault();setDragOver(false);processFiles(e.dataTransfer.files);}},
            React.createElement("input",{ref:fileRef,type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:e=>processFiles(e.target.files)}),
            React.createElement("p",{style:{fontSize:15,fontWeight:500,marginBottom:4}},uploading?"Uploading…":"Drop images here"),
            React.createElement("p",{style:{fontSize:13,color:"#888"}},"or click to browse · JPG, PNG, WEBP · auto-compressed")
          ),
          React.createElement("input",{placeholder:"Label for next upload (optional)",value:label,onChange:e=>setLabel(e.target.value)}),
          uploadError&&React.createElement("p",{className:"error",style:{marginTop:8}},uploadError)
        )
      ),
      images.length===0?React.createElement("p",{className:"empty"},"No images yet. Upload some above."):
      React.createElement("div",null,
        React.createElement("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:12}},
          React.createElement("button",{className:"btn-outline",disabled:downloading,onClick:downloadAll},downloading?"Preparing zip…":`Download all (${images.length})`)
        ),
        React.createElement("div",{className:"grid-images"},
          images.map(img=>{
            const s=getStats(img.id);
            return React.createElement("div",{key:img.id,className:"card",style:{overflow:"hidden",padding:0}},
              React.createElement("div",{style:{height:120,overflow:"hidden",cursor:"zoom-in"},onClick:()=>setPreview(img)},
                React.createElement("img",{src:img.url,alt:img.label||"",style:{width:"100%",height:"100%",objectFit:"cover"}})
              ),
              React.createElement("div",{style:{padding:"10px 12px"}},
                img.label&&React.createElement("p",{style:{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:6}},img.label),
                React.createElement("div",{style:{display:"flex",gap:8,fontSize:12,marginBottom:8}},
                  React.createElement("span",{style:{color:"#22c55e"}},`♥ ${s.likes}`),
                  React.createElement("span",{style:{color:"#ef4444"}},`✕ ${s.dislikes}`),
                  React.createElement("span",{style:{color:"#f59e0b"}},`★ ${s.superlikes}`)
                ),
                React.createElement("button",{onClick:()=>removeImage(img.id),style:{fontSize:12,color:"#dc2626",background:"none",border:"none",cursor:"pointer",padding:0}},"Remove")
              )
            );
          })
        )
      )
    ),
    tab==="results"&&(
      selectedClient?React.createElement(ClientDetail,{client:selectedClient,images,onBack:()=>setSelectedClient(null)}):
      sessions.length===0?React.createElement("p",{className:"empty"},"No client sessions yet."):
      React.createElement("div",null,sessions.map(c=>{
        const voted=Object.keys(c.votes||{}).length;
        const likes=Object.values(c.votes||{}).filter(v=>v==="like").length;
        const superlikes=Object.values(c.votes||{}).filter(v=>v==="superlike").length;
        const progress=images.length?Math.round(voted/images.length*100):0;
        return React.createElement("div",{key:c.name,className:"session-row",onClick:()=>setSelectedClient(c)},
          React.createElement("div",{style:{flex:1}},
            React.createElement("p",{style:{fontWeight:500,fontSize:15,marginBottom:4}},c.name),
            React.createElement("p",{style:{fontSize:13,color:"#888",marginBottom:8}},`${voted}/${images.length} reviewed · `,React.createElement("span",{style:{color:"#22c55e"}},`♥ ${likes}`),` · `,React.createElement("span",{style:{color:"#f59e0b"}},`★ ${superlikes}`)),
            React.createElement("div",{className:"progress-bar"},React.createElement("div",{className:"progress-fill",style:{width:`${progress}%`}}))
          ),
          React.createElement("span",{style:{fontSize:18,color:"#ccc",marginLeft:16}},"›")
        );
      }))
    )
  );
}

function ClientDetail({client,images,onBack}){
  const meta={superlike:{label:"★ Super like",color:"#f59e0b"},like:{label:"♥ Like",color:"#22c55e"},dislike:{label:"✕ Dislike",color:"#ef4444"}};
  return React.createElement("div",null,
    React.createElement("button",{className:"btn-outline",style:{marginBottom:"1.5rem"},onClick:onBack},"← All clients"),
    React.createElement("h2",{style:{fontSize:18,fontWeight:500,marginBottom:4}},client.name),
    client.super_liked&&React.createElement("p",{style:{fontSize:13,color:"#f59e0b",marginBottom:"1.5rem"}},`★ Super liked: ${images.find(i=>i.id===client.super_liked)?.label||"Untitled"}`),
    ["superlike","like","dislike"].map(vote=>{
      const voted=images.filter(img=>client.votes?.[img.id]===vote);
      if(!voted.length)return null;
      return React.createElement("div",{key:vote,style:{marginBottom:"1.5rem"}},
        React.createElement("p",{style:{fontSize:13,fontWeight:500,color:meta[vote].color,marginBottom:10}},`${meta[vote].label} (${voted.length})`),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}},
          voted.map(img=>React.createElement("div",{key:img.id,style:{borderRadius:8,overflow:"hidden",border:`1px solid ${meta[vote].color}40`}},
            React.createElement("div",{style:{height:90}},React.createElement("img",{src:img.url,alt:img.label||"",style:{width:"100%",height:"100%",objectFit:"cover"}})),
            img.label&&React.createElement("p",{style:{fontSize:11,padding:"6px 8px",color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},img.label)
          ))
        )
      );
    })
  );
}

// ── App Root ─────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("loading");
  const [images,setImages]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [session,setSession]=useState(null);
  const [loadError,setLoadError]=useState("");

  const reload=useCallback(async()=>{
    const [imgs,sess]=await Promise.all([db.getImages(),db.getSessions()]);
    setImages(imgs);setSessions(sess);
  },[]);

  useEffect(()=>{
    const t=setTimeout(()=>setLoadError("Connection timed out. Check Supabase policies."),8000);
    reload().then(()=>{clearTimeout(t);setView("home");}).catch(e=>{clearTimeout(t);setLoadError(e.message);setView("home");});
    const interval=setInterval(()=>{if(view!=="swipe")reload();},4000);
    return()=>{clearTimeout(t);clearInterval(interval);};
  },[]);

  const startSession=async name=>{
    const existing=sessions.find(s=>s.name===name);
    const s=existing||{name,votes:{},super_liked:null,super_like_used:false,started_at:Date.now()};
    if(!existing){await db.upsertSession(s);setSessions(prev=>[...prev,s]);}
    setSession(s);setView("swipe");
  };

  const handleVote=async(imgId,dir)=>{
    const updated={...session,votes:{...session.votes,[imgId]:dir}};
    setSession(updated);
    setSessions(prev=>prev.map(s=>s.name===updated.name?updated:s));
    await db.upsertSession(updated);
  };

  const handleSuperLike=async imgId=>{
    if(session.super_like_used)return;
    const updated={...session,super_like_used:true,super_liked:imgId,votes:{...session.votes,[imgId]:"superlike"}};
    setSession(updated);
    setSessions(prev=>prev.map(s=>s.name===updated.name?updated:s));
    await db.upsertSession(updated);
  };

  if(view==="loading")return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:12}},
    React.createElement("p",{className:"muted"},"Connecting…"),
    loadError&&React.createElement("p",{className:"error",style:{textAlign:"center",maxWidth:300}},loadError)
  );
  if(view==="home")return React.createElement(HomeView,{onStart:name=>{startSession(name);},onDashboard:()=>setView("dashlock")});
  if(view==="dashlock")return React.createElement(DashlockView,{onUnlock:()=>setView("dashboard"),onBack:()=>setView("home")});
  if(view==="dashboard")return React.createElement(DashboardView,{images,sessions,onBack:()=>setView("home"),onReload:reload});
  if(view==="swipe")return React.createElement(SwipeView,{images,session,onVote:handleVote,onSuperLike:handleSuperLike,onDone:()=>{setView("home");setSession(null);}});
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
